<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Ну, погоди! — Мобильная версия</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3b 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 10px;
      touch-action: manipulation;
    }

    /* Контейнер игры */
    .game-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      background: #2e7d32;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      overflow: hidden;
      position: relative;
    }

    /* Хедер с очками и временем */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      padding: 12px 16px;
      backdrop-filter: blur(8px);
    }

    .score-box, .timer-box {
      background: rgba(0,0,0,0.7);
      padding: 8px 16px;
      border-radius: 40px;
      color: #ffd966;
      font-weight: bold;
      font-size: 20px;
    }

    .lives-box {
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 40px;
    }

    .lives-box img {
      width: 30px;
      height: 30px;
    }

    /* Игровое поле */
    .game-field {
      position: relative;
      background: linear-gradient(180deg, #4caf50 0%, #388e3c 100%);
      aspect-ratio: 1 / 0.8;
      min-height: 450px;
      overflow: hidden;
      touch-action: none;
    }

    /* Волк */
    .wolf {
      position: absolute;
      width: 30%;
      height: 30%;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      transition: all 0.1s ease;
      z-index: 10;
      pointer-events: none;
    }

    /* Позиции волка */
    .wolf-left-top { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="gray"/><circle cx="35" cy="40" r="5" fill="white"/><circle cx="65" cy="40" r="5" fill="white"/><ellipse cx="50" cy="60" rx="10" ry="8" fill="black"/><polygon points="30,30 40,25 35,35" fill="black"/><polygon points="70,30 60,25 65,35" fill="black"/></svg>'); background-size: 70%; top: 0; left: 0; }
    .wolf-right-top { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="gray"/><circle cx="35" cy="40" r="5" fill="white"/><circle cx="65" cy="40" r="5" fill="white"/><ellipse cx="50" cy="60" rx="10" ry="8" fill="black"/><polygon points="30,30 40,25 35,35" fill="black"/><polygon points="70,30 60,25 65,35" fill="black"/></svg>'); background-size: 70%; top: 0; right: 0; transform: scaleX(-1); }
    .wolf-left-bottom { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="gray"/><circle cx="35" cy="40" r="5" fill="white"/><circle cx="65" cy="40" r="5" fill="white"/><ellipse cx="50" cy="65" rx="12" ry="10" fill="black"/></svg>'); background-size: 70%; bottom: 0; left: 0; }
    .wolf-right-bottom { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="gray"/><circle cx="35" cy="40" r="5" fill="white"/><circle cx="65" cy="40" r="5" fill="white"/><ellipse cx="50" cy="65" rx="12" ry="10" fill="black"/></svg>'); background-size: 70%; bottom: 0; right: 0; transform: scaleX(-1); }

    /* Зоны для кур */
    .hen-zone {
      position: absolute;
      width: 50%;
      height: 50%;
      z-index: 5;
    }
    .hen-zone img {
      position: absolute;
      width: 25%;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
    }
    .top-left { top: 0; left: 0; }
    .top-right { top: 0; right: 0; }
    .bottom-left { bottom: 0; left: 0; }
    .bottom-right { bottom: 0; right: 0; }

    /* Яйца */
    .egg {
      position: absolute;
      width: 20px;
      height: 30px;
      background: white;
      border-radius: 50%;
      z-index: 15;
      transition: all 0.05s linear;
    }

    /* Пауза */
    .pause-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      color: white;
      font-size: 32px;
      font-weight: bold;
    }

    /* Кнопки управления */
    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 15px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(0,0,0,0.8);
      border: 2px solid #ffd966;
      border-radius: 50px;
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      color: #ffd966;
      transition: all 0.05s linear;
      touch-action: manipulation;
      cursor: pointer;
    }

    .ctrl-btn:active {
      transform: scale(0.92);
      background: rgba(255,200,0,0.8);
      color: black;
    }

    .pause-btn {
      background: #8b0000;
      border-color: #ffaa55;
    }

    /* Модальные окна */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }

    .modal-content {
      background: linear-gradient(135deg, #ffd89b, #c7e9fb);
      padding: 30px 20px;
      border-radius: 40px;
      text-align: center;
      max-width: 85%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .modal-content h2 {
      font-size: 28px;
      margin-bottom: 15px;
      color: #d32f2f;
    }

    .modal-content p {
      font-size: 18px;
      margin: 10px 0;
    }

    .btn {
      background: #ff9800;
      border: none;
      padding: 12px 30px;
      font-size: 20px;
      border-radius: 50px;
      margin-top: 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 500px) {
      .ctrl-btn { width: 55px; height: 55px; font-size: 24px; }
      .score-box, .timer-box { font-size: 16px; padding: 6px 12px; }
      .lives-box img { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>
<div class="game-container" id="gameContainer">
  <div class="game-header">
    <div class="score-box">⭐ <span id="score">0</span></div>
    <div class="lives-box" id="livesBox">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='red'%3E%3Cpath d='M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5 2,5.41 4.42,3 7.5,3c1.74,0 3.41.81 4.5,2.08C13.09,3.81 14.76,3 16.5,3 19.58,3 22,5.41 22,8.5c0,3.77-3.4,6.86-8.55,11.54L12,21.35Z'/%3E%3C/svg%3E" alt="❤️">
      <span id="livesCount">3</span>
    </div>
    <div class="timer-box">⏱️ <span id="timer">60</span>с</div>
  </div>

  <div class="game-field" id="gameField">
    <div class="wolf" id="wolf"></div>
    <div class="hen-zone top-left" data-position="top-left">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23f5a623'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Cpolygon points='45,55 55,55 50,65' fill='orange'/%3E%3C/svg%3E" alt="🐔">
    </div>
    <div class="hen-zone top-right" data-position="top-right">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23f5a623'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Cpolygon points='45,55 55,55 50,65' fill='orange'/%3E%3C/svg%3E" alt="🐔">
    </div>
    <div class="hen-zone bottom-left" data-position="bottom-left">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23f5a623'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Cpolygon points='45,55 55,55 50,65' fill='orange'/%3E%3C/svg%3E" alt="🐔">
    </div>
    <div class="hen-zone bottom-right" data-position="bottom-right">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='40' fill='%23f5a623'/%3E%3Ccircle cx='35' cy='40' r='5' fill='black'/%3E%3Cpolygon points='45,55 55,55 50,65' fill='orange'/%3E%3C/svg%3E" alt="🐔">
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-btn" data-key="up">▲</div>
    <div class="ctrl-btn" data-key="down">▼</div>
    <div class="ctrl-btn" data-key="left">◀</div>
    <div class="ctrl-btn" data-key="right">▶</div>
    <div class="ctrl-btn pause-btn" data-key="pause">⏸</div>
  </div>
</div>

<script>
  // Игровые переменные
  let score = 0;
  let lives = 3;
  let timeLeft = 60;
  let gameActive = true;
  let paused = false;
  let wolfPosition = 'left-top';
  let timerInterval = null;
  let eggInterval = null;
  let currentEggs = [];

  // DOM элементы
  const gameField = document.getElementById('gameField');
  const wolf = document.getElementById('wolf');
  const scoreEl = document.getElementById('score');
  const livesCountEl = document.getElementById('livesCount');
  const timerEl = document.getElementById('timer');
  const henZones = document.querySelectorAll('.hen-zone');

  // Функции
  function updateUI() {
    scoreEl.textContent = score;
    livesCountEl.textContent = lives;
    timerEl.textContent = timeLeft;
  }

  function setWolfPosition(pos) {
    wolfPosition = pos;
    wolf.className = `wolf wolf-${pos}`;
  }

  function moveWolf(direction) {
    if (!gameActive || paused) return;
    
    const positions = {
      'up': { 'left-top': 'left-top', 'right-top': 'right-top', 'left-bottom': 'left-top', 'right-bottom': 'right-top' },
      'down': { 'left-top': 'left-bottom', 'right-top': 'right-bottom', 'left-bottom': 'left-bottom', 'right-bottom': 'right-bottom' },
      'left': { 'right-top': 'left-top', 'right-bottom': 'left-bottom', 'left-top': 'left-top', 'left-bottom': 'left-bottom' },
      'right': { 'left-top': 'right-top', 'left-bottom': 'right-bottom', 'right-top': 'right-top', 'right-bottom': 'right-bottom' }
    };
    
    if (positions[direction] && positions[direction][wolfPosition]) {
      setWolfPosition(positions[direction][wolfPosition]);
    }
  }

  function createEgg() {
    if (!gameActive || paused) return;
    
    const positions = ['top-left', 'top-right', 'bottom-left', 'bottom-right'];
    const pos = positions[Math.floor(Math.random() * positions.length)];
    const colors = ['yellow', 'green', 'red'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    
    const egg = document.createElement('div');
    egg.className = 'egg';
    
    // Установка цвета
    if (color === 'yellow') {
      egg.style.background = '#ffeb3b';
      egg.style.boxShadow = 'inset 0px -10px 15px -5px #f9a825';
    } else if (color === 'green') {
      egg.style.background = '#66bb6a';
      egg.style.boxShadow = 'inset 0px -10px 15px -5px #2e7d32';
    } else {
      egg.style.background = '#ef5350';
      egg.style.boxShadow = 'inset 0px -10px 15px -5px #c62828';
    }
    
    // Позиция в зависимости от зоны
    const bounds = gameField.getBoundingClientRect();
    const zoneBounds = document.querySelector(`.hen-zone.${pos}`)?.getBoundingClientRect();
    
    if (zoneBounds) {
      egg.style.left = (zoneBounds.left - bounds.left + zoneBounds.width * 0.4) + 'px';
      egg.style.top = (zoneBounds.top - bounds.top + zoneBounds.height * 0.6) + 'px';
    }
    
    egg.dataset.position = pos;
    egg.dataset.color = color;
    egg.dataset.falling = 'false';
    
    gameField.appendChild(egg);
    currentEggs.push(egg);
    
    // Анимация падения
    animateEgg(egg);
  }
  
  function animateEgg(egg) {
    let fallSpeed = 2;
    let moveX = 0;
    
    if (egg.dataset.position.includes('left')) {
      moveX = 3;
    } else {
      moveX = -3;
    }
    
    const interval = setInterval(() => {
      if (!gameActive || paused || !egg.parentNode) {
        if (!egg.parentNode) clearInterval(interval);
        return;
      }
      
      let top = parseFloat(egg.style.top);
      let left = parseFloat(egg.style.left);
      
      top += fallSpeed;
      left += moveX;
      
      egg.style.top = top + 'px';
      egg.style.left = left + 'px';
      
      // Проверка на ловлю волком
      const wolfBounds = wolf.getBoundingClientRect();
      const eggBounds = egg.getBoundingClientRect();
      const fieldBounds = gameField.getBoundingClientRect();
      
      // Проверка коллизии с волком
      if (eggBounds.right > wolfBounds.left && 
          eggBounds.left < wolfBounds.right && 
          eggBounds.bottom > wolfBounds.top && 
          eggBounds.top < wolfBounds.bottom) {
        
        clearInterval(interval);
        const color = egg.dataset.color;
        
        if (color === 'yellow') {
          score++;
          updateUI();
        } else if (color === 'green') {
          timeLeft += 5;
          updateUI();
        } else if (color === 'red') {
          lives--;
          updateUI();
          if (lives <= 0) gameOver();
        }
        
        egg.remove();
        currentEggs = currentEggs.filter(e => e !== egg);
        return;
      }
      
      // Проверка падения на пол
      if (top + 20 >= fieldBounds.height) {
        clearInterval(interval);
        lives--;
        updateUI();
        
        // Эффект разбития
        egg.style.background = '#ffccbc';
        setTimeout(() => {
          egg.remove();
          currentEggs = currentEggs.filter(e => e !== egg);
        }, 100);
        
        if (lives <= 0) gameOver();
      }
    }, 30);
  }

  function startEggProduction() {
    if (eggInterval) clearInterval(eggInterval);
    eggInterval = setInterval(() => {
      if (gameActive && !paused && timeLeft > 0 && lives > 0) {
        createEgg();
      }
    }, 2000);
  }

  function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (gameActive && !paused && timeLeft > 0) {
        timeLeft--;
        updateUI();
        if (timeLeft <= 0) {
          gameOver();
        }
      }
    }, 1000);
  }

  function gameOver() {
    gameActive = false;
    if (timerInterval) clearInterval(timerInterval);
    if (eggInterval) clearInterval(eggInterval);
    
    currentEggs.forEach(egg => egg.remove());
    currentEggs = [];
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
      <div class="modal-content">
        <h2>🎮 Игра окончена!</h2>
        <p>⭐ Ваш счёт: ${score}</p>
        <p>🏆 Рекорд: ${Math.max(score, localStorage.getItem('highscore') || 0)}</p>
        <button class="btn" id="restartBtn">🔄 Сыграть снова</button>
      </div>
    `;
    
    localStorage.setItem('highscore', Math.max(score, localStorage.getItem('highscore') || 0));
    document.body.appendChild(modal);
    
    document.getElementById('restartBtn').onclick = () => {
      modal.remove();
      restartGame();
    };
  }

  function restartGame() {
    score = 0;
    lives = 3;
    timeLeft = 60;
    gameActive = true;
    paused = false;
    wolfPosition = 'left-top';
    
    updateUI();
    setWolfPosition('left-top');
    
    currentEggs.forEach(egg => egg.remove());
    currentEggs = [];
    
    if (timerInterval) clearInterval(timerInterval);
    if (eggInterval) clearInterval(eggInterval);
    
    startTimer();
    startEggProduction();
  }

  function togglePause() {
    if (!gameActive) return;
    paused = !paused;
    
    if (paused) {
      const pauseDiv = document.createElement('div');
      pauseDiv.className = 'pause-overlay';
      pauseDiv.id = 'pauseOverlay';
      pauseDiv.innerHTML = '<span>⏸ ПАУЗА</span>';
      gameField.appendChild(pauseDiv);
    } else {
      const pauseDiv = document.getElementById('pauseOverlay');
      if (pauseDiv) pauseDiv.remove();
    }
  }

  // Обработка кликов по зонам кур (для мобильных)
  henZones.forEach(zone => {
    zone.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!gameActive || paused) return;
      const pos = zone.dataset.position;
      if (pos === 'top-left') setWolfPosition('left-top');
      else if (pos === 'top-right') setWolfPosition('right-top');
      else if (pos === 'bottom-left') setWolfPosition('left-bottom');
      else if (pos === 'bottom-right') setWolfPosition('right-bottom');
    });
    
    zone.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!gameActive || paused) return;
      const pos = zone.dataset.position;
      if (pos === 'top-left') setWolfPosition('left-top');
      else if (pos === 'top-right') setWolfPosition('right-top');
      else if (pos === 'bottom-left') setWolfPosition('left-bottom');
      else if (pos === 'bottom-right') setWolfPosition('right-bottom');
    });
  });

  // Кнопки управления
  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.key;
      if (key === 'pause') togglePause();
      else if (key === 'up') moveWolf('up');
      else if (key === 'down') moveWolf('down');
      else if (key === 'left') moveWolf('left');
      else if (key === 'right') moveWolf('right');
    });
    
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const key = btn.dataset.key;
      if (key === 'pause') togglePause();
      else if (key === 'up') moveWolf('up');
      else if (key === 'down') moveWolf('down');
      else if (key === 'left') moveWolf('left');
      else if (key === 'right') moveWolf('right');
    });
  });

  // Инициализация
  function init() {
    updateUI();
    setWolfPosition('left-top');
    startTimer();
    startEggProduction();
  }
  
  init();
</script>
</body>
</html>
